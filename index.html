<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
    }

    header {
      background: #2563eb;
      color: white;
      padding: 24px;
      text-align: center;
    }

    main {
      max-width: 720px;
      margin: 40px auto;
      padding: 0 20px;
    }

    section {
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    button {
      background: #2563eb;
      border: 0;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 16px;
      padding: 10px 16px;
    }

    button:hover {
      background: #1d4ed8;
    }

    footer {
      margin-top: 32px;
      text-align: center;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Work Space</h1>
    <p>A simple HTML file with CSS and JavaScript.</p>
  </header>

  <main>
    <section>
      <h2>Hello there!</h2>
      <p>This is a basic web page you can edit and open in any browser.</p>
      <button onclick="showMessage()">Click Me</button>
      <p id="message"></p>
    </section>

    <footer>
      <p>&copy; 2026 Sample Page</p>
    </footer>
  </main>

  <script>
    function showMessage() {
      document.getElementById("message").textContent = "Button clicked successfully!";
    }
  </script>
</body>
</html>
